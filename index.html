<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <title>机标结构化修改器</title>
  <style>
:root {
  --bg: #f6f7fb;
  --panel: #ffffff;
  --text: #172033;
  --muted: #6b7280;
  --border: #d9dee8;
  --primary: #2563eb;
  --primary-dark: #1d4ed8;
  --danger: #dc2626;
  --warning: #d97706;
  --success: #16a34a;
  --shot: #eef5ff;
  --utterance: #ffffff;
  --field-bg: #f8fafc;
  --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
  --radius: 14px;
}
* { box-sizing: border-box; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
}
#app { max-width: 1480px; margin: 0 auto; padding: 18px; }
.app-header {
  display: flex; justify-content: space-between; gap: 16px; align-items: center;
  padding: 18px 20px; margin-bottom: 14px; border-radius: var(--radius);
  background: linear-gradient(120deg, #172033, #1e3a8a); color: white; box-shadow: var(--shadow);
}
.app-header h1 { margin: 0 0 6px; font-size: 24px; letter-spacing: 0.5px; }
.app-header p { margin: 0; opacity: 0.86; }
.header-actions { display: flex; gap: 10px; flex-wrap: wrap; }
.btn {
  border: 1px solid var(--border); background: #fff; color: var(--text);
  border-radius: 10px; padding: 8px 12px; font-size: 14px; cursor: pointer; transition: all 0.15s ease;
}
.btn:hover { border-color: #9ca3af; background: #f9fafb; }
.btn.primary { background: var(--primary); color: #fff; border-color: var(--primary); }
.btn.primary:hover { background: var(--primary-dark); }
.btn.ghost { background: rgba(255,255,255,0.12); color: white; border-color: rgba(255,255,255,0.35); }
.btn.ghost:hover { background: rgba(255,255,255,0.2); }
.btn.danger-ghost { background: rgba(220,38,38,0.14); color: white; border-color: rgba(255,255,255,0.25); }
.btn.small { padding: 5px 8px; font-size: 12px; border-radius: 8px; }
.btn.danger { color: white; border-color: var(--danger); background: var(--danger); }
.btn.icon { padding: 5px 9px; }
input:focus, textarea:focus, select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); }
.app-shell {
  display: grid; grid-template-columns: 1fr 2fr; height: calc(100vh - 60px); gap: 12px; box-sizing: border-box;
}
.left-pane, .right-pane {
  min-height: 0; background: #ffffff; border: 1px solid #e5e7eb; border-radius: 12px;
  display: flex; flex-direction: column; overflow: hidden;
}
.pane-header {
  flex: 0 0 auto; display: flex; align-items: center; gap: 8px;
  padding: 10px 12px; border-bottom: 1px solid #e5e7eb; background: #f8fafc;
}
.pane-header h2 { margin: 0; font-size: 15px; white-space: nowrap; }
.raw-textarea {
  flex: 1; width: 100%; resize: none; border: 0; outline: none; padding: 14px;
  font-family: "SFMono-Regular", Consolas, Menlo, monospace; font-size: 13px; line-height: 1.6;
  background: #fbfdff;
}
.raw-textarea:focus { box-shadow: inset 0 0 0 3px rgba(37,99,235,0.12); }
.editor-root { flex: 1; overflow: auto; padding: 12px; }
.hidden { display: none !important; }
.empty-state { text-align: center; color: var(--muted); }
.empty-title { font-size: 18px; font-weight: 700; color: #374151; margin-bottom: 6px; }
.validation-box {
  flex: 0 0 auto; max-height: 140px; overflow: auto; font-size: 13px; line-height: 1.55;
  border-top: 1px solid #e5e7eb; padding: 8px 12px; background: #f9fafb;
}
.validation-box.muted { color: var(--muted); }
.validation-item { padding: 4px 6px; border-radius: 6px; margin-bottom: 3px; }
.validation-item.error { background: #fef2f2; color: #991b1b; }
.validation-item.warn { background: #fffbeb; color: #92400e; }
.validation-item.ok { background: #f0fdf4; color: #166534; }
.summary-bar {
  margin-bottom: 12px; padding: 8px 12px; border: 1px dashed #c8d2e4;
  background: #f8fbff; color: var(--muted); border-radius: 10px; font-size: 13px; line-height: 1.5;
}
.shot-card {
  border: 2px solid #e5e7eb; border-radius: 12px; margin-bottom: 12px; background: #ffffff;
  overflow: hidden; transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease; cursor: default;
}
.shot-card:hover { border-color: #93c5fd; box-shadow: 0 0 0 3px rgba(147,197,253,0.25); }
.shot-card.selected { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,0.22); background: #eff6ff; }
.shot-card.invalid { border-color: #fca5a5; background: #fff7f7; }
.shot-card.invalid.selected { border-color: #dc2626; box-shadow: 0 0 0 3px rgba(220,38,38,0.18); }
.shot-card.warning { border-color: #fbbf24; }
.shot-header {
  display: flex; flex-wrap: wrap; align-items: center; gap: 8px;
  padding: 10px 12px; background: #f1f5f9; border-bottom: 1px solid #e5e7eb;
}
.shot-title { display: flex; align-items: center; gap: 8px; font-weight: 800; color: #173b77; white-space: nowrap; }
.shot-badge {
  width: 30px; height: 30px; display: grid; place-items: center;
  border-radius: 50%; background: var(--primary); color: white;
}
.shot-time { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; color: #334155; font-size: 13px; }
.field-input, .field-select, .content-input {
  border: 1px solid var(--border); border-radius: 9px; padding: 7px 9px;
  background: white; color: var(--text); font-size: 13px;
}
.field-input.time { width: 86px; }
.shot-actions, .utt-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.utterances { padding: 12px; display: flex; flex-direction: column; gap: 10px; }
.utterance-card {
  margin: 10px 0; padding: 10px; border: 1.5px solid #e5e7eb;
  border-radius: 10px; background: #ffffff;
  transition: border-color 0.12s ease, box-shadow 0.12s ease, background 0.12s ease; cursor: default;
}
.utterance-card:hover { border-color: #bfdbfe; box-shadow: 0 0 0 2px rgba(191,219,254,0.45); }
.utterance-card.selected { border-color: #2563eb; background: #eff6ff; box-shadow: 0 0 0 2px rgba(37,99,235,0.18); }
.utterance-card.invalid { border-color: #fca5a5; background: #fffafa; }
.utt-header { display: flex; justify-content: space-between; gap: 10px; align-items: center; margin-bottom: 10px; }
.utt-title { font-weight: 800; color: #334155; }
.utt-grid { display: flex; flex-direction: column; gap: 8px; }
.utt-content-group { flex: 1; }
.utt-time-group { display: flex; gap: 10px; flex-wrap: wrap; }
.utt-hover-row { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; padding-top: 6px; border-top: 1px solid #f1f5f9; }
.field-group { display: flex; flex-direction: column; gap: 4px; }
.field-group label { font-size: 12px; font-weight: 700; color: #64748b; }
.content-input { min-height: 68px; resize: vertical; line-height: 1.45; }
.hover-select { position: relative; display: inline-flex; align-items: center; gap: 6px; margin: 4px 8px 4px 0; }
.field-label { font-size: 12px; color: #64748b; }
.field-chip {
  display: inline-flex; align-items: center; min-width: 54px; padding: 4px 9px;
  border-radius: 999px; background: #e0f2fe; color: #075985; font-size: 13px; font-weight: 600; cursor: default;
}
.hover-menu { display: flex; gap: 5px; position: absolute; z-index: 50; left: 0; top: 100%; padding: 4px 6px 6px;
  background: #ffffff; border: 1px solid #cbd5e1; border-radius: 10px; box-shadow: 0 10px 28px rgba(15,23,42,0.18); white-space: nowrap;
  visibility: hidden; opacity: 0; pointer-events: none;
  transition: opacity 0.08s ease, visibility 0s 0.08s; }
.hover-select:hover .hover-menu,
.hover-menu:hover,
.hover-select.menu-open .hover-menu { visibility: visible; opacity: 1; pointer-events: auto; transition-delay: 0s; }
.hover-option { border: 0; border-radius: 999px; padding: 5px 10px; background: #f1f5f9; color: #0f172a; font-size: 13px; cursor: pointer; }
.hover-option:hover { background: #bfdbfe; }
.hover-option.active { background: #2563eb; color: #ffffff; }
.empty-utterance { color: var(--muted); border: 1px dashed #cbd5e1; background: rgba(255,255,255,0.55); padding: 14px; border-radius: 12px; text-align: center; }
.status-dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 5px; background: var(--success); }
.status-dot.warn { background: var(--warning); }
.status-dot.err { background: var(--danger); }
.context-menu { position: fixed; z-index: 99; min-width: 160px; background: white; border: 1px solid var(--border); box-shadow: var(--shadow); border-radius: 10px; padding: 6px; }
.context-menu button { display: block; width: 100%; text-align: left; border: 0; background: transparent; padding: 8px 10px; border-radius: 8px; cursor: pointer; }
.context-menu button:hover { background: #f1f5f9; }
.danger-text { color: var(--danger); }
@media (max-width: 1050px) { .app-shell { grid-template-columns: 1fr; height: auto; } .left-pane { min-height: 200px; } .right-pane { min-height: 400px; } }
@media (max-width: 640px) { #app { padding: 10px; } .app-header { flex-direction: column; align-items: stretch; } .shot-header { flex-direction: column; align-items: stretch; } .utt-time-group { flex-direction: column; } }
.modal-overlay { position: fixed; inset: 0; z-index: 999; background: rgba(15,23,42,0.45); display: grid; place-items: center; animation: fadeIn 0.15s ease; }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
.modal-box { background: #fff; border-radius: 16px; padding: 24px 24px 16px; min-width: 340px; max-width: 400px; box-shadow: 0 20px 60px rgba(0,0,0,0.18); animation: slideUp 0.15s ease; }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 6px; color: var(--text); }
.modal-desc { font-size: 14px; color: var(--muted); margin: 0 0 16px; line-height: 1.5; }
.modal-actions { display: flex; flex-direction: column; gap: 8px; }
.modal-btn { padding: 10px 14px !important; font-size: 14px !important; border-radius: 10px !important; text-align: left !important; line-height: 1.4; }
.modal-btn small { display: block; font-weight: 400; font-size: 12px; opacity: 0.75; margin-top: 2px; }
.modal-btn-muted { color: var(--muted) !important; border-color: #d1d5db !important; background: #f9fafb !important; }
.modal-btn-muted:hover { background: #f3f4f6 !important; border-color: #9ca3af !important; }
.modal-btn-cancel { text-align: center !important; color: #9ca3af !important; margin-top: 2px; }
/* ===== LS 连接功能 ===== */
.task-bar {
  display: flex; align-items: center; gap: 12px; flex-wrap: wrap;
  padding: 8px 16px; margin-bottom: 10px;
  background: #f0f4ff; border: 1px solid #cdd9f0;
  border-radius: 10px; font-size: 13px;
}
.task-bar .task-id { font-weight: 700; color: #1e40af; }
.task-bar .task-memo { color: #4b5563; max-width: 340px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.task-bar .task-status { margin-left: auto; font-size: 12px; white-space: nowrap; }
.task-bar .task-status.ok { color: #16a34a; }
.task-bar .task-status.error { color: #dc2626; }
.task-bar .task-status.loading { color: #d97706; }
@keyframes pulseRed {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.7; }
}
@keyframes slideDown {
  from { transform: translateY(-100%); }
  to { transform: translateY(0); }
}
.discard-banner {
  position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
  display: flex; align-items: center; justify-content: center; gap: 14px;
  padding: 16px 20px;
  background: linear-gradient(135deg, #dc2626, #b91c1c);
  color: #fff; font-size: 20px; font-weight: 800;
  box-shadow: 0 8px 32px rgba(220,38,38,0.5);
  animation: slideDown 0.4s ease, pulseRed 2s ease-in-out infinite 0.4s;
  cursor: pointer;
  text-shadow: 0 1px 4px rgba(0,0,0,0.2);
}
.discard-banner .icon { font-size: 28px; }
.discard-banner .sub { font-weight: 400; font-size: 14px; opacity: 0.9; }
.discard-prompt {
  display: inline-flex; align-items: center; gap: 6px;
  margin-left: 8px; padding: 2px 10px; border-radius: 999px;
  background: #fef2f2; border: 1.5px solid #dc2626;
  color: #991b1b; font-size: 12px; font-weight: 800;
}
.discard-prompt::before { content: "⚠️"; font-weight: 400; }
@keyframes floatRed {
  0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.35), 0 0 0 0 rgba(220,38,38,0.1); }
  50% { box-shadow: 0 0 6px 2px rgba(220,38,38,0.45), 0 0 18px 6px rgba(220,38,38,0.12); }
}
.field-chip.uncertain {
  background: #dc2626 !important; color: #fff !important;
  border: 2px solid #b91c1c !important; font-weight: 800 !important;
  animation: floatRed 1.4s ease-in-out infinite !important;
  transform: scale(1.08) !important; margin: 0 4px !important;
}
.submit-bar {
  flex: 0 0 auto;
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px;
  border-top: 1px solid #e5e7eb;
  background: #f8fafc;
}
.submit-bar .submit-status { margin-left: auto; font-size: 13px; }
.submit-bar .submit-status.ok { color: #16a34a; }
.submit-bar .submit-status.error { color: #dc2626; }
.submit-bar .submit-status.loading { color: #d97706; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
/* ===== 设置面板 ===== */
.settings-field { margin-bottom: 12px; }
.settings-field label { display: block; font-size: 13px; font-weight: 700; color: #374151; margin-bottom: 4px; }
.settings-field input { width: 100%; padding: 8px 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 14px; box-sizing: border-box; }
.settings-field input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.12); outline: none; }
.settings-field .readonly-field { background: #f3f4f6; color: #6b7280; cursor: not-allowed; }
.settings-tip { font-size: 12px; color: #6b7280; margin: -4px 0 10px; line-height: 1.4; }
  </style>
</head>
<body>
  <div id="discardBanner" class="discard-banner hidden" onclick="this.classList.add('hidden')">
      <span class="icon">🚨</span>
      <span>上一轮提示丢弃</span>
      <span class="sub" id="discardBannerSub">-</span>
      <span style="font-weight:400;font-size:13px;opacity:0.7">（点击关闭）</span>
    </div>
    <div id="app" style="padding-top:0;grid-template-columns:1fr 2fr;">
    <main class="app-shell">
      <section class="left-pane">
        <header class="app-header" style="border-radius:12px 12px 0 0;border-bottom:1px solid #e5e7eb;padding:12px 14px;">
          <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;width:100%;justify-content:space-between;">
            <div>
              <h1 style="margin:0;font-size:18px;">机标结构化修改器</h1>
              <p style="margin:2px 0 0;font-size:12px;opacity:0.7;">机标文本 → 镜头/说话单元模块</p>
            </div>
            <div style="display:flex;gap:6px;flex-wrap:wrap;">
              <button id="btnFetchTask" class="btn" style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.35);padding:5px 9px;font-size:12px;">📥 从LS拉取</button>
              <button id="btnSettings" class="btn" style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.35);padding:5px 9px;font-size:12px;">⚙️</button>
              <button id="btnDiscardSettings" class="btn" style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.35);padding:5px 9px;font-size:12px;">🗑️丢弃提示</button>
              <button id="btnLoadSample" class="btn" style="background:rgba(255,255,255,0.15);color:white;border-color:rgba(255,255,255,0.35);padding:5px 9px;font-size:12px;">载入示例</button>
              <button id="btnReset" class="btn" style="background:rgba(220,38,38,0.25);color:white;border-color:rgba(255,255,255,0.25);padding:5px 9px;font-size:12px;">清空</button>
            </div>
          </div>
        </header>
        <div id="taskBar" class="task-bar hidden" style="border-radius:0;margin:0;">
          <span>📌 任务 #<span id="taskId" class="task-id">-</span></span>
          <span id="discardPrompt" class="discard-prompt hidden"></span>
          <span class="task-memo">｜ 备注: <span id="memoText">-</span></span>
          <a id="videoLink" href="#" target="_blank" class="btn small hidden">▶ 打开视频</a>
          <span id="taskStatus" class="task-status"></span>
        </div>
        <div class="pane-header" style="border-top:0;">
          <h2 id="leftPaneTitle">原始机标 / 导出结果</h2>
          <button id="btnPaste" class="btn small">粘贴</button>
          <button id="btnParse" class="btn primary small">解析成模块</button>
          <button id="btnExport" class="btn small">导出到左侧</button>
          <button id="btnCopyOutput" class="btn primary small hidden">复制结果</button>
        </div>
        <textarea id="rawInput" class="raw-textarea" spellcheck="false" placeholder="在这里粘贴原始机标文本，例如：\n[镜头 1][0.00s-0.76s]\n{...}"></textarea>
        <div id="validationBox" class="validation-box muted">暂无校验结果。</div>
      </section>
      <section class="right-pane">
        <div class="pane-header">
          <h2>结构化修改</h2>
          <button id="btnAddShot" class="btn small">+ 新增镜头</button>
          <button id="btnValidate" class="btn small">校验</button>
        </div>
        <div id="editor" class="editor-root">
          <div class="empty-state">
            <div class="empty-title">还没有解析内容</div>
            <div class="empty-text">粘贴机标后点击「解析成模块」。</div>
          </div>
        </div>
        <div id="submitBar" class="submit-bar hidden">
          <button id="btnDiscard" class="btn danger small">🗑 丢弃此条</button>
          <button id="btnSubmit" class="btn primary small">✅ 提交并下一个</button>
          <span id="submitStatus" class="submit-status"></span>
        </div>
      </section>
    </main>
  </div>
  <!-- 设置面板 -->
  <div id="settingsOverlay" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:380px;">
      <div class="modal-title">⚙️ LS 连接设置</div>
      <p class="modal-desc">配置 Label Studio 服务器信息，设置自动保存到本地。</p>
      <div class="settings-field">
        <label>LS 服务器地址</label>
        <input id="settingLSBase" type="text" placeholder="http://115.191.32.74:30014" />
      </div>
      <div class="settings-field">
        <label>项目 ID</label>
        <input id="settingProjectId" type="number" placeholder="4296" />
      </div>
      <div class="settings-field">
        <label>API Token（固定预设）</label>
        <input class="readonly-field" type="text" value="f1189e9eafd25393abaf1eac483290f3b62fb204" readonly />
      </div>
      <div class="modal-actions">
        <button id="btnSaveSettings" class="btn modal-btn" style="text-align:center;background:#2563eb;color:#fff;">保存设置</button>
        <button id="btnCloseSettings" class="btn ghost modal-btn-cancel" style="text-align:center;">取消</button>
      </div>
    </div>
  </div>
  <!-- 丢弃提示管理设置面板 -->
  <div id="discardSettingsOverlay" class="modal-overlay hidden">
    <div class="modal-box" style="min-width:400px;">
      <div class="modal-title">🗑️ 丢弃提示关键词管理</div>
      <p class="modal-desc">在任务备注(memo)中检测到以下关键词时，任务栏会显示红色丢弃提示。</p>
      <div class="settings-field">
        <label>关键词（逗号/空格分隔）</label>
        <input id="settingMemoKeywords" type="text" placeholder="分屏, 渐变, 定格, 黑幕, 丢弃, 慢动作, 快进" />
      </div>
      <div class="settings-tip">修改后点击保存，刷新页面即可生效。</div>
      <div class="modal-actions">
        <button id="btnSaveDiscardSettings" class="btn modal-btn" style="text-align:center;background:#dc2626;color:#fff;">保存设置</button>
        <button id="btnCloseDiscardSettings" class="btn ghost modal-btn-cancel" style="text-align:center;">取消</button>
      </div>
    </div>
  </div>
  <template id="contextMenuTemplate">
    <div class="context-menu" role="menu">
      <button data-context-action="duplicate">复制这个说话单元</button>
      <button data-context-action="delete" class="danger-text">删除这个说话单元</button>
    </div>
  </template>
  <script>

function closeContextMenu(){document.querySelectorAll('.context-menu').forEach(function(m){m.remove();});}
// ==================== LS API 连接功能 ====================
const LS_TOKEN = 'f1189e9eafd25393abaf1eac483290f3b62fb204';
var currentTaskId = null;

function getLSBase() { return localStorage.getItem('ls_base') || 'http://115.191.32.74:30014'; }
function getProjectId() { return Number(localStorage.getItem('ls_project_id')) || 4296; }
function saveSettings() {
  var base = document.getElementById('settingLSBase').value.trim() || 'http://115.191.32.74:30014';
  var pid = Number(document.getElementById('settingProjectId').value) || 4296;
  localStorage.setItem('ls_base', base);
  localStorage.setItem('ls_project_id', String(pid));

}

async function lsFetch(path, opts) {
  var base = getLSBase();
  if (!opts) opts = {};
  opts.headers = opts.headers || {};
  opts.headers['Authorization'] = 'Token ' + LS_TOKEN;
  if (!(opts.body instanceof FormData)) {
    opts.headers['Content-Type'] = 'application/json';
  }
  var resp = await fetch(base + path, opts);
  if (!resp.ok) {
    var errText = '';
    try { errText = await resp.text(); } catch(e) {}
    throw new Error('LS API ' + resp.status + ': ' + (errText || resp.statusText).slice(0, 200));
  }
  var text = await resp.text();
  return text && text.trim() ? JSON.parse(text) : null;
}

function setTaskStatus(msg, type) {
  var el = document.getElementById('taskStatus');
  el.textContent = msg;
  el.className = 'task-status' + (type ? ' ' + type : '');
}

function setSubmitStatus(msg, type) {
  var el = document.getElementById('submitStatus');
  el.textContent = msg;
  el.className = 'submit-status' + (type ? ' ' + type : '');
}

async function checkLSConnection() {
  try {
    await lsFetch('/api/projects/?page=1&page_size=1');
    setTaskStatus('✅ LS 已连接', 'ok');
    return true;
  } catch (err) {
    setTaskStatus('⚠️ LS 未连接: ' + err.message, 'error');
    return false;
  }
}

async function fetchNextTask() {
  if (state.shots.length && !confirm('当前修改未提交，确认载入新任务吗？')) return;
  state.shots = []; selectedTarget = null; els.rawInput.value = ''; render();
  document.getElementById('discardBanner').classList.add('hidden');
  await loadNextTask();
}

async function submitAndNext(discard) {
  if (!currentTaskId) { alert('没有活跃任务'); return; }
  if (!discard && !state.shots.length && !els.rawInput.value.trim()) {
    alert('没有可提交的内容。请先修改或选择"丢弃此条"。');
    return;
  }
  if (!discard && state.shots.length) {
    var risks = checkRisk();
    var blocks = risks.filter(function(r){return r.level==='error';});
    var warns = risks.filter(function(r){return r.level==='warn';});
    if (blocks.length) {
      var msgs = blocks.map(function(r){return '  ⛔ '+r.msg;}).join('\n');
      alert('⚠️ 风险检查未通过（共 '+blocks.length+' 项），禁止提交：\n\n'+msgs);
      setSubmitStatus('❌ 风险检查未通过，请修改', 'error');
      document.getElementById('btnSubmit').disabled = false;
      document.getElementById('btnDiscard').disabled = false;
      return;
    }
    if (warns.length) {
      if (!confirm('⚠️ 发现以下建议项（共 '+warns.length+' 项），是否确认提交？\n\n'+warns.map(function(r){return '  ⚠️ '+r.msg;}).join('\n')+'\n\n点击「确定」继续提交')) return;
    }
  }
  setSubmitStatus('提交中...', 'loading');
  document.getElementById('btnSubmit').disabled = true;
  document.getElementById('btnDiscard').disabled = true;
  try {
    var text = discard ? '' : (state.shots.length ? generateOutput() : (els.rawInput.value || ''));
    await lsFetch('/api/tasks/' + currentTaskId + '/annotations/', {
      method: 'POST',
      body: JSON.stringify({
        result: [
          { from_name: 'caption_v5_translate_update', to_name: 'video', type: 'textarea', value: { text: [text] } },
          { from_name: 'choice0', to_name: 'video', type: 'choices', value: { choices: [discard ? '是' : '否'] } }
        ]
      })
    });
    var action = discard ? '已丢弃' : '已提交';
    setSubmitStatus(action + ' ✅', 'ok');
    setTaskStatus(action, 'ok');
    state.shots = []; selectedTarget = null; currentTaskId = null;
    els.rawInput.value = ''; render();
    document.getElementById('submitBar').classList.add('hidden');
    await loadNextTask();
  } catch (err) {
    setSubmitStatus('❌ 提交失败: ' + err.message, 'error');
  } finally {
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('btnDiscard').disabled = false;
  }
}

async function loadNextTask() {
  setTaskStatus('正在获取下一任务...', 'loading');
  document.getElementById('btnFetchTask').disabled = true;
  var pid = getProjectId();
  try {
    var retries = 0, maxRetries = 5, unlabeled = null;
    while (retries < maxRetries && !unlabeled) {
      if (retries > 0) await new Promise(function(r) { setTimeout(r, 600); });
      retries++;
      var data = await lsFetch('/api/tasks/?project=' + pid + '&page=1&page_size=100');
      var tasks = data.results || data.tasks || [];
      for (var i = 0; i < tasks.length; i++) {
        if (!tasks[i].is_labeled && (!tasks[i].annotations || tasks[i].annotations.length === 0)) {
          unlabeled = tasks[i]; break;
        }
      }
      if (!unlabeled) {
        var total = data.total || data.count || 0;
        if (total > tasks.length) {
          var data2 = await lsFetch('/api/tasks/?project=' + pid + '&page=2&page_size=100');
          var tasks2 = data2.results || data2.tasks || [];
          for (var j = 0; j < tasks2.length; j++) {
            if (!tasks2[j].is_labeled && (!tasks2[j].annotations || tasks2[j].annotations.length === 0)) {
              unlabeled = tasks2[j]; break;
            }
          }
        }
      }
    }
    if (!unlabeled) { setTaskStatus('✅ 所有任务已完成！', 'ok'); return; }
    currentTaskId = unlabeled.id;
    var taskData = unlabeled.data || {};
    var captionText = taskData.caption_v5_translate || '';
    document.getElementById('taskId').textContent = currentTaskId;
    var memo = taskData.memo || '-';
    document.getElementById('memoText').textContent = memo;
    updateDiscardPrompt(memo);
    document.getElementById('taskBar').classList.remove('hidden');
    document.getElementById('submitBar').classList.remove('hidden');
    els.rawInput.value = captionText;
    els.leftPaneTitle.textContent = '原始机标 / 导出结果';
    document.getElementById('btnCopyOutput').classList.add('hidden');
    var videoUrl = taskData.video_url;
    var videoLink = document.getElementById('videoLink');
    if (videoUrl) { videoLink.href = videoUrl; videoLink.classList.remove('hidden'); }
    else { videoLink.classList.add('hidden'); }
    setTaskStatus('任务 #' + currentTaskId + ' 已加载', 'ok');
    setSubmitStatus('请修改后提交，或点击丢弃', '');
    document.getElementById('btnSubmit').disabled = false;
    document.getElementById('btnDiscard').disabled = false;
    state.shots = []; selectedTarget = null;
    var shots = parseCaption(captionText);
    if (shots.length) { state.shots = shots; render(); }
    else { render(); setTaskStatus('⚠️ 任务 #' + currentTaskId + ' 解析无镜头', 'error'); }
  } catch (err) {
    setTaskStatus('❌ 获取下一任务失败: ' + err.message, 'error');
  } finally {
    document.getElementById('btnFetchTask').disabled = false;
  }
}

  document.getElementById('settingLSBase').value = getLSBase();
  document.getElementById('settingProjectId').value = getProjectId();
  document.getElementById('settingsOverlay').classList.remove('hidden');

document.getElementById('btnFetchTask').addEventListener('click', fetchNextTask);

  submitAndNext(true);

  saveMemoKeywords();

  var memoEl = document.getElementById('memoText');
  if (memoEl && memoEl.textContent !== '-') updateDiscardPrompt(memoEl.textContent);
  alert('关键词已保存');
});

// 页面加载后检测 LS 连通性
setTimeout(function() { checkLSConnection(); }, 100);
render();
